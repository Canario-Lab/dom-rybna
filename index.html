<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strona w budowie</title>
  <style>
    :root {
      --sky-top: #fff6dc;
      --sky-bottom: #ffd8a8;
      --sun: #ffcd5b;
      --card: rgba(255, 250, 240, 0.78);
      --card-border: rgba(173, 112, 31, 0.16);
      --shadow: rgba(95, 52, 16, 0.16);
      --headline: #5c2f12;
      --accent: #d7862f;
      --grass-dark: #5b8d38;
      --grass-light: #81b84e;
      --roof: #c85f32;
      --wall: #fff5e6;
      --trim: #9e512d;
      --window: #a8dbf5;
      --path: #d9c4a6;
      --crane: #f7c52e;
      --crane-dark: #bf9311;
      --flower-a: #f17070;
      --flower-b: #ffb84d;
      --flower-c: #8d7cf6;
      --flower-d: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.7) 0, rgba(255, 255, 255, 0) 38%),
        linear-gradient(180deg, var(--sky-top) 0%, #ffe7c4 42%, #ffc98d 100%);
      font-family: "Avenir Next", "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--headline);
    }

    main {
      width: min(100%, 980px);
      padding: clamp(20px, 4vw, 34px);
      border: 1px solid var(--card-border);
      border-radius: 32px;
      background: var(--card);
      backdrop-filter: blur(14px);
      box-shadow: 0 24px 70px var(--shadow);
    }

    .scene {
      width: 100%;
      display: block;
      filter: drop-shadow(0 18px 24px rgba(108, 63, 23, 0.14));
    }

    h1 {
      margin: 24px 0 0;
      text-align: center;
      font-size: clamp(2rem, 4vw, 3.8rem);
      line-height: 1.05;
      letter-spacing: -0.05em;
      text-transform: lowercase;
    }

    .highlight {
      color: var(--accent);
    }

    .cloud-one {
      animation: drift 11s ease-in-out infinite;
    }

    .cloud-two {
      animation: drift 13s ease-in-out infinite reverse;
    }

    .hook {
      transform-origin: 682px 168px;
      animation: sway 4.8s ease-in-out infinite;
    }

    .flowers circle:nth-child(odd) {
      animation: bloom 3.6s ease-in-out infinite;
    }

    .flowers circle:nth-child(even) {
      animation: bloom 4.2s ease-in-out infinite reverse;
    }

    @keyframes sway {
      0%, 100% {
        transform: rotate(3deg);
      }
      50% {
        transform: rotate(-3deg);
      }
    }

    @keyframes drift {
      0%, 100% {
        transform: translateX(0);
      }
      50% {
        transform: translateX(10px);
      }
    }

    @keyframes bloom {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-2px);
      }
    }

    @media (max-width: 700px) {
      body {
        padding: 14px;
      }

      main {
        border-radius: 24px;
        padding: 16px;
      }

      h1 {
        margin-top: 18px;
      }
    }
  </style>
</head>
<body>

      <ellipse cx="456" cy="456" rx="224" ry="40" fill="rgba(95, 52, 16, 0.10)" />

        <g stroke="var(--crane-dark)" stroke-width="6" stroke-linecap="round">

    </svg>

    <h1>strona w budowie, <span class="highlight">zaraz wracamy</span></h1>

</body>
</html>
