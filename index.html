<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strona w budowie</title>
  <style>
    :root {
      --canvas: #f6f0e6;
      --canvas-deep: #eadfcc;
      --panel: rgba(255, 252, 247, 0.78);
      --panel-border: rgba(98, 76, 53, 0.12);
      --ink: #38281b;
      --muted: #78624c;
      --accent: #d7a623;
      --accent-deep: #b38312;
      --sage: #7f9575;
      --sage-deep: #5d7255;
      --roof: #8d503d;
      --stone: #d8c9b4;
      --window: #d7e5e6;
      --line: rgba(63, 47, 32, 0.25);
      --shadow: rgba(53, 37, 19, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--ink);
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.55), rgba(255, 255, 255, 0) 34%),
        linear-gradient(180deg, var(--canvas) 0%, #efe4d2 54%, var(--canvas-deep) 100%);
      font-family: "Avenir Next", "Segoe UI", sans-serif;
    }

    .shell {
      width: min(100%, 1080px);
      border-radius: 36px;
      border: 1px solid var(--panel-border);
      background: var(--panel);
      box-shadow: 0 28px 80px var(--shadow);
      backdrop-filter: blur(14px);
      overflow: hidden;
      position: relative;
      isolation: isolate;
    }

    .shell::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 16% 14%, rgba(255, 255, 255, 0.5), transparent 28%),
        radial-gradient(circle at 84% 12%, rgba(215, 166, 35, 0.16), transparent 24%);
      z-index: -1;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(280px, 1fr) minmax(360px, 1.2fr);
      gap: clamp(24px, 4vw, 52px);
      align-items: center;
      padding: clamp(26px, 4vw, 56px);
    }

    .copy {
      max-width: 400px;
    }

    .eyebrow {
      margin: 0 0 18px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.7);
      border: 1px solid rgba(98, 76, 53, 0.1);
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 6px rgba(215, 166, 35, 0.14);
    }

    h1 {
      margin: 0;
      font-family: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", serif;
      font-size: clamp(2.8rem, 5vw, 5.2rem);
      line-height: 0.96;
      letter-spacing: -0.045em;
      font-weight: 600;
      text-wrap: balance;
    }

    h1 .accent {
      color: var(--accent-deep);
      font-style: italic;
    }

    p {
      margin: 20px 0 0;
      max-width: 34ch;
      color: var(--muted);
      font-size: clamp(1rem, 1.6vw, 1.15rem);
      line-height: 1.7;
    }

    .scene-wrap {
      position: relative;
      min-height: 360px;
    }

    .scene-wrap::after {
      content: "";
      position: absolute;
      inset: auto 10% 5% 10%;
      height: 24px;
      border-radius: 999px;
      background: rgba(83, 58, 31, 0.1);
      filter: blur(10px);
      z-index: 0;
    }

    .scene {
      width: 100%;
      display: block;
      position: relative;
      z-index: 1;
    }

    .crane-arm {
      transform-origin: 700px 152px;
      animation: arm-sway 7s ease-in-out infinite;
    }

    .crane-hook {
      transform-origin: 724px 198px;
      animation: hook-sway 5s ease-in-out infinite;
    }

    .leaf-left,
    .leaf-right {
      transform-origin: center bottom;
      animation: leaf-drift 6s ease-in-out infinite;
    }

    .leaf-right {
      animation-delay: 1s;
    }

    @keyframes arm-sway {
      0%, 100% {
        transform: rotate(0deg);
      }
      50% {
        transform: rotate(-1.4deg);
      }
    }

    @keyframes hook-sway {
      0%, 100% {
        transform: rotate(2deg);
      }
      50% {
        transform: rotate(-2deg);
      }
    }

    @keyframes leaf-drift {
      0%, 100% {
        transform: rotate(0deg);
      }
      50% {
        transform: rotate(4deg);
      }
    }

    @media (max-width: 900px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .copy {
        max-width: none;
      }

      .scene-wrap {
        min-height: 0;
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 14px;
      }

      .shell {
        border-radius: 26px;
      }

      .layout {
        padding: 20px;
        gap: 18px;
      }

      .eyebrow {
        font-size: 0.75rem;
        letter-spacing: 0.16em;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="layout">
      <div class="copy">
        <div class="eyebrow">Dom Rybna</div>
        <h1>strona w budowie,<br><span class="accent">zaraz wracamy</span></h1>
        <p>
          Przygotowujemy spokojniejszą, dopracowaną odsłonę serwisu. W międzyczasie
          żółty dźwig czuwa nad domem i ogrodem.
        </p>
      </div>

      <div class="scene-wrap">
        <svg class="scene" viewBox="0 0 720 520" role="img" aria-label="Elegancka ilustracja żółtego dźwigu stojącego nad domkiem z ogródkiem.">
          <defs>
            <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#fbf6ee" />
              <stop offset="100%" stop-color="#efe3d3" />
            </linearGradient>
            <linearGradient id="houseWall" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#fcf8f1" />
              <stop offset="100%" stop-color="#efe3d5" />
            </linearGradient>
            <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#e7eff0" />
              <stop offset="100%" stop-color="#cbdadc" />
            </linearGradient>
          </defs>

          <rect x="26" y="32" width="668" height="452" rx="36" fill="url(#sky)" />
          <circle cx="570" cy="104" r="38" fill="#f0d496" opacity="0.55" />

          <path d="M58 400C140 364 220 358 302 381C394 408 474 412 564 382C611 367 648 364 692 378V444H58Z" fill="#b5c2ab" />
          <path d="M58 422C132 398 209 398 293 416C391 438 481 439 571 415C620 402 655 402 692 412V462H58Z" fill="#95a786" />

          <ellipse cx="420" cy="423" rx="184" ry="26" fill="rgba(56, 40, 27, 0.08)" />

          <g>
            <path d="M266 247L407 152L545 247V258H266Z" fill="var(--roof)" />
            <rect x="288" y="246" width="236" height="152" rx="16" fill="url(#houseWall)" />
            <path d="M378 173L409 149L442 173V226H378Z" fill="#a3614c" />
            <rect x="309" y="269" width="70" height="86" rx="12" fill="url(#glass)" stroke="rgba(88, 102, 104, 0.35)" stroke-width="3" />
            <line x1="344" y1="269" x2="344" y2="355" stroke="rgba(88, 102, 104, 0.35)" stroke-width="3" />
            <line x1="309" y1="312" x2="379" y2="312" stroke="rgba(88, 102, 104, 0.35)" stroke-width="3" />

            <rect x="433" y="269" width="70" height="86" rx="12" fill="url(#glass)" stroke="rgba(88, 102, 104, 0.35)" stroke-width="3" />
            <line x1="468" y1="269" x2="468" y2="355" stroke="rgba(88, 102, 104, 0.35)" stroke-width="3" />
            <line x1="433" y1="312" x2="503" y2="312" stroke="rgba(88, 102, 104, 0.35)" stroke-width="3" />

            <rect x="390" y="304" width="41" height="94" rx="14" fill="#a97058" />
            <circle cx="421" cy="349" r="4" fill="#f4e3c7" />
            <rect x="278" y="392" width="256" height="16" rx="8" fill="var(--stone)" />
          </g>

          <g>
            <path class="leaf-left" d="M222 392C205 356 214 331 248 316C267 342 267 369 247 397Z" fill="#6f8466" />
            <path class="leaf-left" d="M248 404C229 373 233 347 265 332C286 356 286 382 271 408Z" fill="#88a07e" />
            <path class="leaf-right" d="M560 399C577 363 570 338 536 321C516 347 515 373 534 402Z" fill="#6f8466" />
            <path class="leaf-right" d="M534 409C553 379 550 351 518 336C497 360 497 387 511 413Z" fill="#88a07e" />
          </g>

          <g>
            <path d="M347 425C378 409 431 408 464 425C442 438 368 438 347 425Z" fill="#ddcfb7" />
            <line x1="408" y1="411" x2="408" y2="435" stroke="rgba(102, 79, 55, 0.16)" stroke-width="2" />
          </g>

          <g>
            <rect x="570" y="120" width="18" height="276" rx="9" fill="var(--accent)" />
            <g stroke="var(--accent-deep)" stroke-width="4" stroke-linecap="round">
              <line x1="570" y1="152" x2="588" y2="170" />
              <line x1="570" y1="190" x2="588" y2="208" />
              <line x1="570" y1="228" x2="588" y2="246" />
              <line x1="570" y1="266" x2="588" y2="284" />
              <line x1="570" y1="304" x2="588" y2="322" />
              <line x1="570" y1="342" x2="588" y2="360" />
            </g>

            <g class="crane-arm">
              <rect x="588" y="138" width="112" height="16" rx="8" fill="var(--accent)" />
              <line x1="606" y1="138" x2="632" y2="154" stroke="var(--accent-deep)" stroke-width="4" stroke-linecap="round" />
              <line x1="640" y1="138" x2="666" y2="154" stroke="var(--accent-deep)" stroke-width="4" stroke-linecap="round" />
              <line x1="674" y1="138" x2="700" y2="154" stroke="var(--accent-deep)" stroke-width="4" stroke-linecap="round" />

              <g class="crane-hook">
                <line x1="662" y1="154" x2="662" y2="256" stroke="#8a6716" stroke-width="4" />
                <path d="M662 256C662 270 653 280 643 280C634 280 627 274 627 266C627 258 633 251 642 251" fill="none" stroke="#8a6716" stroke-width="7" stroke-linecap="round" />
                <rect x="643" y="214" width="38" height="22" rx="8" fill="#e2c78d" />
              </g>
            </g>
          </g>

          <g opacity="0.45" stroke="var(--line)" stroke-width="2">
            <line x1="122" y1="142" x2="176" y2="142" />
            <line x1="140" y1="124" x2="194" y2="124" />
          </g>
        </svg>
      </div>
    </section>
  </main>
</body>
</html>
